name: Build

on: [push, pull_request]

jobs:
  linux_x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
            submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.13'
            architecture: 'x64'
            cache: 'pip'
            cache-dependency-path: '**/requirements.txt'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get Version
        run: |
          git fetch --tags --force --unshallow || git fetch --tags --force
          VERSION="$(git describe --tags --always)"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Rust Extension
        run: |
          python -m maturin build --release --manifest-path rust/sims2patcher-py/Cargo.toml --out wheels
          python -m pip install wheels/*.whl

      - name: Build
        run: |
          python setup.py build
          python -c "from pathlib import Path; import os; Path('dist/version.txt').write_text(os.environ['VERSION'] + '\n', encoding='utf-8')"
          echo "https://github.com/lah7/sims2-4k-ui-patch" > "dist/View on GitHub.txt"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
            name: "build-linux-x64-${{ env.VERSION }}"
            path: "dist"

  windows_x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
            submodules: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.13'
            architecture: 'x64'
            cache: 'pip'
            cache-dependency-path: '**/requirements.txt'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get Version
        run: |
          git fetch --tags --force --unshallow
          if ($LASTEXITCODE -ne 0) { git fetch --tags --force }
          $VERSION = git describe --tags --always
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Rust Extension
        run: |
          python -m maturin build --release --manifest-path rust/sims2patcher-py/Cargo.toml --out wheels
          python -m pip install (Get-ChildItem wheels\*.whl).FullName

      - name: Build
        run: |
          python setup.py build
          python -c "from pathlib import Path; import os; Path('dist/version.txt').write_text(os.environ['VERSION'] + '\n', encoding='utf-8')"
          copy assets\github.url "dist\View on GitHub.url"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
            name: "build-windows-x64-${{ env.VERSION }}"
            path: "dist"
